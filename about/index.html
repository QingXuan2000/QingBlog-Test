<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark">
    <title>关于</title>
    <meta name="description" content="关于我" />
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="../css/QBLOG.css" />
    <link rel="stylesheet" href="../css/font-awesome.min.css" />
    <style>
        .card-list {
            border-top: none;
        }
    </style>
</head>

<body>
    <header id="title">
        <h1>关于我</h1>
    </header>

    <main class="about-card__wrapper">
        <article class="card about-card">
            <header class="card__header">
                <h2>"我"</h2>
            </header>

            <div class="card__content">
                <section class="about-card__info">
                    <div class="about-card__avatar">
                        <img src="../img/Avatar.png" alt="作者头像" />
                    </div>
                    <div class="about-card__author-text">
                        <h3></h3>
                        <p></p>
                    </div>
                </section>

                <section class="about-card__desc">
                    <p></p>
                </section>

                <section class="about-card__skills">
                    <header class="card__header">
                        <h2>"我的标签"</h2>
                    </header>

                    <div class="about-card__chart-wrapper">
                        <div class="about-card__chart" role="img" aria-label="作者标签词云图"></div>
                    </div>
                </section>
            </div>

            <footer class="card__footer"></footer>
        </article>
    </main>

    <script src="../js/echarts.min.js"></script>
    <script src="../js/echarts-wordcloud.min.js"></script>
    <script src="../js/QBLOG.js"></script>
</body>

</html>
